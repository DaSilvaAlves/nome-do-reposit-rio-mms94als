<!DOCTYPE html>
<html lang="pt-PT">
>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM</title>
  <style>
    /* === GLOBAL STYLES === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      background: #0a0a0a; 
      color: #e5e5e5; 
      min-height: 100vh; 
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
    }
    :root { 
      --color-bg: #0a0a0a; 
      --color-fg: #ffffff; 
      --color-accent: #00F5FF; 
      --color-accent-secondary: #03A9F4; 
      --blur-amount: 12px; 
      --border-glow: 0 0 16px(var(--color-accent), 0.3);
    }
    /* === TYPGRAPHY === */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700&display=swap');
    h1, h2 { 
      font-family: 'Orbitron', sans-serif; 
      letter-spacing: 012em; 
      background: linear-gradient(to right, var(--color-accent), var(--color-accent-secondary)); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    /* === INPUTS === */
    input, textarea, select {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #e5e5e5;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    input, textarea:focus, select:focus { 
      border-color: var(--color-accent); 
      box-shadow: 0 0 0 3px rgba(var(--color-accent), 0.15); 
    }
    /* === BUTTONS === */
    button {
      background: var(--color-accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button.secondary { 
      background: rgba(255,255,255,0.08); 
      color: #e5e5e5; 
    }
    /* === CARDS === */
    .card { 
      background: rgba(255,255,255,0.05); 
      backdrop-filter: blur(var(--blur-amount)); 
      border: 1px solid rgba(var(--color-accent), 0.15); 
      border-radius: 12px; 
      padding: 24px; 
    }
    /* === CURSOR === */
    .cursor {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--color-accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
    }
    .cursor::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      background: var(--color-accent);
      border-radius: 50%;
      opacity: 0.2;
      pointer-events none;
      transition: transform 0.1s;
    }
    /* === SCROLLBAR === */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--color-accent);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>
<body>
  <header>
    <h1>CRM</h1>
    <nav>
      <button>Dashboard</button>
      <button>Leads</button>
      <button>Relatórios</button>
    </nav>
  </header>
  <main>
    <section class="card">
      <h2>Leads</h2>
      <ul>
        <li>
          <span>Nome:</span>
         input type="text" placeholder="Nome do lead">
        </li>
        <li>
          <span>Telefone:</span>
          <input type="text" placeholder="Telefone do lead">
        </li>
        <li>
          <span>E-mail:</span>
          <input type="email" placeholder="E-mail do lead">
        </li>
      </ul>
      <button>Guardar</button>
    </section>
    <section class="card">
      <h2>Relatórios</h2>
      <ul>
        <li>
          <span>Lead 1</span>
          <span>Telefone: 123456789</span>
          <span>E-mail: lead1@example.com</span>
        </li>
        <li>
          <span>Lead 2</span>
          <span>Telefone:987654321</span>
          <span>E-mail: lead2@example.com</span>
        </li>
      </ul>
    </section>
  </main>
  <script>
    // === LOCAL STORAGE ===
    const leads = JSON.parse(localStorage.getItem('leads')) || [];
    const saveLeads = () => {
      localStorage.setItem('leads', JSON.stringify(leads));
    };
    // === FORM HANDLER ===
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const lead = {
        nome: document.querySelector('input[name="nome"]').value,
        telefone: document.querySelector('input[name="telefone"]').value,
        email: document.querySelector('input[name="email"]').value,
      };
      leads.push(lead);
      saveLeads();
      form.reset();
    });
    // === CURSOR EFFECT ===
    const cursor = document.createElement('div');
    cursor.classList.add('cursor');
    document.body.appendChild(cursor);
    document.addEventListener('mousemove', (e) => {
      cursor.style.top = `${e.clientY}px`;
      cursor.style.left = `${e.clientX}px`;
    });
  </script>
</body>
</html>
